name: Release

on:
  push:
    branches: [master]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next patch version from latest tag
        id: version
        run: |
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$LATEST_TAG" ]; then
            # No tags yet — fall back to gradle.properties
            VERSION=$(grep '^app.version=' gradle.properties | cut -d'=' -f2)
          else
            CURRENT=${LATEST_TAG#v}
            MAJOR=$(echo "$CURRENT" | cut -d. -f1)
            MINOR=$(echo "$CURRENT" | cut -d. -f2)
            PATCH=$(echo "$CURRENT" | cut -d. -f3)
            VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "Next release: v${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build-macos:
    needs: check-version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Package DMG and uber JAR
        run: ./gradlew packageDmg packageUberJarForCurrentOS -Papp.version=${{ needs.check-version.outputs.version }}

      - name: Rename uber JAR
        run: |
          VERSION=${{ needs.check-version.outputs.version }}
          mv build/compose/jars/*.jar "build/compose/jars/ME7Tuner-${VERSION}-macos-aarch64.jar"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-aarch64
          path: |
            build/compose/binaries/main/dmg/*.dmg
            build/compose/jars/*.jar

  build-windows:
    needs: check-version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Package MSI and uber JAR
        shell: bash
        run: ./gradlew packageMsi packageUberJarForCurrentOS "-Papp.version=${{ needs.check-version.outputs.version }}"

      - name: Rename uber JAR
        shell: bash
        run: |
          VERSION=${{ needs.check-version.outputs.version }}
          mv build/compose/jars/*.jar "build/compose/jars/ME7Tuner-${VERSION}-windows-x64.jar"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: |
            build/compose/binaries/main/msi/*.msi
            build/compose/jars/*.jar

  build-linux:
    needs: check-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Package DEB and uber JAR
        run: ./gradlew packageDeb packageUberJarForCurrentOS -Papp.version=${{ needs.check-version.outputs.version }}

      - name: Create portable tar.gz and rename uber JAR
        run: |
          ./gradlew createDistributable -Papp.version=${{ needs.check-version.outputs.version }}
          VERSION=${{ needs.check-version.outputs.version }}
          tar -czf "ME7Tuner-${VERSION}-linux-x64.tar.gz" \
            -C build/compose/binaries/main/app .
          mv build/compose/jars/*.jar "build/compose/jars/ME7Tuner-${VERSION}-linux-x64.jar"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            build/compose/binaries/main/deb/*.deb
            build/compose/jars/*.jar
            ME7Tuner-*-linux-x64.tar.gz

  release:
    needs: [check-version, build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p flat
          find artifacts -type f \( -name '*.dmg' -o -name '*.msi' -o -name '*.deb' -o -name '*.jar' -o -name '*.tar.gz' \) -exec cp {} flat/ \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: ME7Tuner ${{ needs.check-version.outputs.version }}
          generate_release_notes: true
          files: flat/*
