name: Pre-Release

on:
  push:
    branches: [develop]

concurrency:
  group: pre-release
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      pkg_version: ${{ steps.version.outputs.pkg_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute beta version from latest stable tag
        id: version
        run: |
          # Find the latest stable (non-beta) tag
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | grep -v beta | head -1)
          if [ -z "$LATEST_TAG" ]; then
            VERSION=$(grep '^app.version=' gradle.properties | cut -d'=' -f2)
            BETA_NUM=$(git rev-list --count HEAD)
          else
            CURRENT=${LATEST_TAG#v}
            MAJOR=$(echo "$CURRENT" | cut -d. -f1)
            MINOR=$(echo "$CURRENT" | cut -d. -f2)
            PATCH=$(echo "$CURRENT" | cut -d. -f3)
            VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
            BETA_NUM=$(git rev-list --count "${LATEST_TAG}..HEAD")
          fi

          # Display version for tags, JAR names, and GitHub release title
          DISPLAY_VERSION="${VERSION}-beta.${BETA_NUM}"
          # Native package version — strictly numeric, max 3 segments for DMG/MSI/DEB.
          # Encode beta number into the patch segment: (PATCH+1)*1000 + BETA_NUM
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          PKG_PATCH=$(( PATCH * 1000 + BETA_NUM ))
          PKG_VERSION="$(echo "$VERSION" | cut -d. -f1).$(echo "$VERSION" | cut -d. -f2).${PKG_PATCH}"

          echo "Next pre-release: v${DISPLAY_VERSION} (native packages: ${PKG_VERSION})"
          echo "version=${DISPLAY_VERSION}" >> "$GITHUB_OUTPUT"
          echo "pkg_version=${PKG_VERSION}" >> "$GITHUB_OUTPUT"

  build-macos:
    needs: check-version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Package DMG (numeric version) and uber JAR (display version)
        run: |
          ./gradlew packageDmg -Papp.version=${{ needs.check-version.outputs.pkg_version }}
          ./gradlew packageUberJarForCurrentOS -Papp.version=${{ needs.check-version.outputs.version }}

      - name: Rename uber JAR
        run: |
          VERSION=${{ needs.check-version.outputs.version }}
          mv build/compose/jars/*.jar "build/compose/jars/ME7Tuner-${VERSION}-macos-aarch64.jar"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-aarch64
          path: |
            build/compose/binaries/main/dmg/*.dmg
            build/compose/jars/*.jar

  build-windows:
    needs: check-version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Package MSI (numeric version) and uber JAR (display version)
        shell: bash
        run: |
          ./gradlew packageMsi "-Papp.version=${{ needs.check-version.outputs.pkg_version }}"
          ./gradlew packageUberJarForCurrentOS "-Papp.version=${{ needs.check-version.outputs.version }}"

      - name: Rename uber JAR
        shell: bash
        run: |
          VERSION=${{ needs.check-version.outputs.version }}
          mv build/compose/jars/*.jar "build/compose/jars/ME7Tuner-${VERSION}-windows-x64.jar"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: |
            build/compose/binaries/main/msi/*.msi
            build/compose/jars/*.jar

  build-linux:
    needs: check-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Package DEB (numeric version) and uber JAR (display version)
        run: |
          ./gradlew packageDeb -Papp.version=${{ needs.check-version.outputs.pkg_version }}
          ./gradlew packageUberJarForCurrentOS -Papp.version=${{ needs.check-version.outputs.version }}

      - name: Create portable tar.gz and rename uber JAR
        run: |
          ./gradlew createDistributable -Papp.version=${{ needs.check-version.outputs.pkg_version }}
          VERSION=${{ needs.check-version.outputs.version }}
          tar -czf "ME7Tuner-${VERSION}-linux-x64.tar.gz" \
            -C build/compose/binaries/main/app .
          mv build/compose/jars/*.jar "build/compose/jars/ME7Tuner-${VERSION}-linux-x64.jar"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            build/compose/binaries/main/deb/*.deb
            build/compose/jars/*.jar
            ME7Tuner-*-linux-x64.tar.gz

  pre-release:
    needs: [check-version, build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Delete previous beta pre-releases
        uses: actions/github-script@v7
        with:
          script: |
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            for (const release of releases.data) {
              if (release.prerelease && release.tag_name.includes('-beta.')) {
                console.log(`Deleting pre-release: ${release.tag_name}`);
                await github.rest.repos.deleteRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: release.id
                });
                try {
                  await github.rest.git.deleteRef({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    ref: `tags/${release.tag_name}`
                  });
                  console.log(`Deleted tag: ${release.tag_name}`);
                } catch (e) {
                  console.log(`Tag ${release.tag_name} already gone`);
                }
              }
            }

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p flat
          find artifacts -type f \( -name '*.dmg' -o -name '*.msi' -o -name '*.deb' -o -name '*.jar' -o -name '*.tar.gz' \) -exec cp {} flat/ \;

      - name: Create GitHub Pre-Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: ME7Tuner ${{ needs.check-version.outputs.version }} (Beta)
          generate_release_notes: true
          prerelease: true
          files: flat/*

